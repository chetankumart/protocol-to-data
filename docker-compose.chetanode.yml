# ChetanNode overlay — host networking.
#
# The ThinkCentre's default Docker *bridge* network has no outbound route (firewall/routing), so a
# bridged container can't reach api.anthropic.com (`Network is unreachable`) — but the host can.
# Running on the *host* network (like open-webui / cloudflared already do) restores egress AND lets
# the host-network cloudflared tunnel reach the app at localhost:7860.
#
# Usage:  docker compose -f docker-compose.yml -f docker-compose.chetanode.yml up -d --build
services:
  protocol-to-data:
    network_mode: host
    ports: !reset []        # host networking is incompatible with published ports; clear the base's
    environment:
      # Build marker for the page footer. Derived from git at deploy time (the deploy command
      # exports GIT_COMMIT=$(git rev-parse --short HEAD)); this `environment` entry OVERRIDES the
      # base compose's `env_file: .env`, so a stale GIT_COMMIT pinned in .env can no longer leak
      # through. Falls back to 'local' if the deploy didn't export it.
      - GIT_COMMIT=${GIT_COMMIT:-local}
